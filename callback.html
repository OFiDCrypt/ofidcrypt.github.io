<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phantom Callback</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { max-width: 360px; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #6b21a8;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Completing login...</h2>
        <p id="status">Please wait</p>
    </div>

    <script>
        function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');

            console.log("📨 Phantom Callback received:", { code: !!code, error });

            if (error) {
                document.getElementById('status').textContent = "Login failed";
                document.getElementById('status').style.color = "#ef4444";
            } else {
                document.getElementById('status').textContent = "Success! Redirecting...";
            }

            // Clean redirect back to wallet with the code
            const redirectUrl = `${window.location.origin}/wallet.html?phantom_callback=1&code=${encodeURIComponent(code || '')}`;

            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 600);
        }

        window.addEventListener('load', handleCallback);
    </script>
</body>
</html>
