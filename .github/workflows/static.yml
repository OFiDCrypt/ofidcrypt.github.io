# Simple workflow for deploying static content to GitHub Pages with Vite Compilation
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job that compiles code and deploys
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Uses package-lock.json to cleanly install the Phantom SDK in the cloud runner

      - name: Run Vite Build Compiler
        run: npm run build # Triggers your vite.config.js to output everything into /dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Compiled Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # CRITICAL FIXED: Uploads your compiled, bundled /dist folder instead of the root!
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
