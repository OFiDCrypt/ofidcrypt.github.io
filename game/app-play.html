<!DOCTYPE html>
<html lang="en-us">

<head>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3KX9VK5CCH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3KX9VK5CCH');
  </script>

  <title>Giddy's Blinko | OFiDCrypt</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="A retro collect-to-win game from the creators of Giddy's Universe — by DiscoCar Games. Play Blinko, collect Bouncy Balls!">

  <!-- Favicons -->
  <link rel="icon" href="TemplateData/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="TemplateData/apple-touch-icon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>

<body>

  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

    <!-- LOADING BAR -->
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">Giddy's Blinko</div>
    </div>

    <!-- Bottom Banner Carousel -->
    <div id="bottom-banner" class="ad-banner-wrapper" style="display: none; height: 90px; flex-shrink: 0; z-index: 10;">
      <div class="ad-scroll-container-mobile">
        <a href="https://shop.ledger.com/pages/ledger-nano-s-plus/?r=aa8d4fce2d9a&tracker=ofid_banner_index"
          class="ad-slide">
          <img src="/assets/images/ledger-nano-s-plus.png" alt="Ad Banner 1">
        </a>
        <a href="https://kraken.pxf.io/xLox1A" class="ad-slide">
          <img src="/assets/images/kraken-banner-01.PNG" alt="Ad Banner 2">
        </a>
        <a href="https://freeproducer.ca/" class="ad-slide">
          <img src="/assets/images/banner-free-producer.PNG" alt="Ad Banner 3">
        </a>
        <a href="/bouncyball.html#buy-expb" class="ad-slide">
          <img src="/assets/images/expb-banner-01.png" alt="Ad Banner 4">
        </a>
        <a href="https://t.co/gQBLmw20Qp" class="ad-slide">
          <img src="/assets/images/dobby-banner-01.png" alt="Ad Banner 5">
        </a>
      </div>
    </div>

  </div><!-- End of Unity Container -->



  <!-- Unity Loader Script -->
  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      else setTimeout(() => { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/GiddGameWeb.loader.js";
    var config = {
      dataUrl: buildUrl + "/GiddGameWeb.data.unityweb",
      frameworkUrl: buildUrl + "/GiddGameWeb.framework.js.unityweb",
      codeUrl: buildUrl + "/GiddGameWeb.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "giddy",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
        fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);
      }).catch((message) => alert(message));
    };
    document.body.appendChild(script);
  </script>

  <!-- External Scripts -->
  <script src="../assets/js/ofid-main.js"></script>
  <script src="../assets/js/game/carousel.js" defer></script>

</body>
</html>
